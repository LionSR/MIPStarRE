name: Blueprint ↔ Lean sync

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'blueprint/**'
      - 'MIPStarRE/**'
      - 'lakefile.toml'
      - 'lake-manifest.json'
      - 'lean-toolchain'
      - 'scripts/blueprint_axiom_audit_needed.py'
      - 'scripts/blueprint_lean_sync.py'
      - 'scripts/blueprint_leanok_axioms.py'
      - 'scripts/tex_utils.py'
      - 'scripts/tests/**'
      - '.github/workflows/blueprint-sync.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  blueprint-sync:
    runs-on: ubuntu-latest
    name: Check blueprint ↔ Lean sync and \leanok axioms
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Run blueprint sync unit tests
        run: python3 -m unittest discover -s scripts/tests -p 'test_*.py'

      - name: Regenerate blueprint/lean_decls
        run: python3 scripts/blueprint_lean_sync.py --root . --update-lean-decls

      - name: Check blueprint ↔ Lean surface sync
        run: python3 scripts/blueprint_lean_sync.py --root . --ci

      - name: Decide whether the axiom audit is needed
        id: axiom-audit-needed
        env:
          BASE_REF: origin/${{ github.base_ref || 'main' }}
        run: python3 scripts/blueprint_axiom_audit_needed.py --base-ref "$BASE_REF" --github-output

      - name: Set up Lean toolchain and fetch Mathlib cache
        if: >-
          github.event_name == 'workflow_dispatch' ||
          steps.axiom-audit-needed.outputs.needs_axiom_audit == 'true'
        uses: texra-ai/lean-env-action@main

      - name: Build MIPStarRE
        if: >-
          github.event_name == 'workflow_dispatch' ||
          steps.axiom-audit-needed.outputs.needs_axiom_audit == 'true'
        run: lake build

      - name: Check \leanok declarations are sorry-free
        if: >-
          github.event_name == 'workflow_dispatch' ||
          steps.axiom-audit-needed.outputs.needs_axiom_audit == 'true'
        run: python3 scripts/blueprint_leanok_axioms.py --ci
