name: Full documentation

on:
  schedule:
    # Run weekly on Sunday at 06:00 UTC
    - cron: '0 6 * * 0'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch to build docs from (default: main)'
        required: false
        default: 'main'

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build_project:
    runs-on: ubuntu-latest
    name: Build project and generate docs
    timeout-minutes: 330
    steps:
      - name: Cleanup to free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # main as of 2026-04-13
        with:
          tool-cache: false
          android: true
          dotnet: false
          haskell: false
          large-packages: false
          docker-images: false
          swap-storage: false

      - name: Checkout project
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref || 'main' }}

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: .github/workflows/blueprint-requirements.txt

      - name: Build project
        uses: leanprover/lean-action@v1
        with:
          build: true

      - name: Cache apt packages (TeX Live / Graphviz)
        id: apt-cache
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          # Shared key with blueprint.yml so both workflows warm each other's apt cache.
          # Bump the suffix when the package list below changes.
          key: apt-blueprint-texlive-${{ runner.os }}-v1

      - name: Install TeX and graphviz
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            texlive-xetex \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-science \
            latexmk \
            graphviz \
            libgraphviz-dev

      - name: Cache pipx leanblueprint environment
        id: pipx-cache
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pipx
          # Shared key with blueprint.yml so both workflows warm each other's pipx cache.
          key: pipx-leanblueprint-${{ runner.os }}-${{ hashFiles('.github/workflows/blueprint-requirements.txt') }}

      - name: Install leanblueprint
        if: steps.pipx-cache.outputs.cache-hit != 'true'
        run: |
          pipx install leanblueprint
          pipx inject --include-apps --force leanblueprint plastex

      - name: Ensure pipx shims are on PATH
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Build blueprint
        working-directory: blueprint
        run: |
          tmp_output_file="$(mktemp)"

          set +o pipefail
          {
            leanblueprint pdf
            pdf_status=$?
            if [ "$pdf_status" -ne 0 ]; then
              exit "$pdf_status"
            fi
            if [ ! -s print/print.pdf ]; then
              echo "::error::leanblueprint pdf produced no output"
              exit 1
            fi
            leanblueprint web
          } 2>&1 | tee "$tmp_output_file"
          cmd_status=${PIPESTATUS[0]}
          set -o pipefail

          if grep -q "^ERROR:" "$tmp_output_file"; then
            echo "::error::Blueprint has unresolved labels (see ERROR lines above)"
            exit 1
          fi
          if grep -q "WARNING: File not found:" "$tmp_output_file"; then
            echo "::error::Blueprint has missing files (see WARNING lines above)"
            exit 1
          fi

          if [ "$cmd_status" -ne 0 ]; then
            exit "$cmd_status"
          fi

      - name: Generate API docs
        run: |
          cd docbuild
          lake build MIPStarRE:docs

      - name: Deploy to gh-pages
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: ./scripts/deploy-to-gh-pages.sh --with-docs --ci
