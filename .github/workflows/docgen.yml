name: Full documentation

on:
  schedule:
    # Run weekly on Sunday at 06:00 UTC
    - cron: '0 6 * * 0'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch to build docs from (default: main)'
        required: false
        default: 'main'

concurrency:
  group: pages-deploy
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build_project:
    runs-on: ubuntu-latest
    name: Build project and generate docs
    timeout-minutes: 330
    steps:
      - name: Cleanup to free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # main as of 2026-04-13
        with:
          tool-cache: false
          android: true
          dotnet: false
          haskell: false
          large-packages: false
          docker-images: false
          swap-storage: false

      - name: Checkout project
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref || 'main' }}

      - name: Build project, blueprint, and documentation
        uses: leanprover-community/docgen-action@main
        with:
          blueprint: true
          homepage: home_page
