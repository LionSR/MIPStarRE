name: Full documentation

on:
  schedule:
    # Run weekly on Sunday at 06:00 UTC
    - cron: '0 6 * * 0'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch to build docs from (default: main)'
        required: false
        default: 'main'

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  build_project:
    runs-on: ubuntu-latest
    name: Build project and generate docs
    timeout-minutes: 330
    steps:
      - name: Cleanup to free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # main as of 2026-04-13
        with:
          tool-cache: false
          android: true
          dotnet: false
          haskell: false
          large-packages: false
          docker-images: false
          swap-storage: false

      - name: Checkout project
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref || 'main' }}

      - name: Install elan and pre-initialize packages
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf \
            | sh -s -- --default-toolchain none -y
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Workaround ProofWidgets prune bug
        # lake exe cache get (inside lean-action) runs `lake update`, whose mathlib
        # post-update hook tries to prune .lake/packages/proofwidgets/.lake/build/lib.
        # On a fresh runner that directory doesn't exist, causing an uncaught exception
        # that kills the entire cache fetch.  We pre-run `lake update` (ignoring the
        # hook failure), then create the missing directory so the second `lake update`
        # inside lean-action finds it and succeeds.
        run: |
          elan show
          lake update 2>&1 || true
          mkdir -p .lake/packages/proofwidgets/.lake/build/lib

      - name: Build project
        uses: leanprover/lean-action@v1
        with:
          build: true

      - name: Install TeX and graphviz
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            texlive-xetex \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-science \
            latexmk \
            graphviz \
            libgraphviz-dev

      - name: Install leanblueprint
        run: |
          pipx install leanblueprint
          pipx inject --include-apps --force leanblueprint plastex

      - name: Build blueprint
        working-directory: blueprint
        run: |
          tmp_output_file="$(mktemp)"

          set +o pipefail
          {
            leanblueprint pdf
            pdf_status=$?
            if [ "$pdf_status" -ne 0 ]; then
              exit "$pdf_status"
            fi
            if [ ! -s print/print.pdf ]; then
              echo "::error::leanblueprint pdf produced no output"
              exit 1
            fi
            leanblueprint web
          } 2>&1 | tee "$tmp_output_file"
          cmd_status=${PIPESTATUS[0]}
          set -o pipefail

          if grep -q "^ERROR:" "$tmp_output_file"; then
            echo "::error::Blueprint has unresolved labels (see ERROR lines above)"
            exit 1
          fi
          if grep -q "WARNING: File not found:" "$tmp_output_file"; then
            echo "::error::Blueprint has missing files (see WARNING lines above)"
            exit 1
          fi

          if [ "$cmd_status" -ne 0 ]; then
            exit "$cmd_status"
          fi

      - name: Restore docbuild cache
        uses: actions/cache@v4
        with:
          path: docbuild/.lake/build
          key: docbuild-${{ runner.os }}-${{ hashFiles('lean-toolchain', 'docbuild/lake-manifest.json') }}
          restore-keys: docbuild-${{ runner.os }}-

      - name: Generate API docs
        run: |
          cd docbuild
          lake build MIPStarRE:docs

      - name: Deploy to gh-pages
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: ./scripts/deploy-to-gh-pages.sh --with-docs --ci

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toISOString().split('T')[0];
            const title = `docgen CI failure — ${date}`;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `The **Full documentation** workflow failed and the GitHub Pages docs are stale.`,
              ``,
              `**Run:** [${context.runId}](${runUrl})`,
              `**Triggered by:** ${context.eventName}`,
              `**Branch:** \`${context.ref}\``,
            ].join('\n');

            const { data: open } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'bug',
            });
            const duplicate = open.find(i => i.title.startsWith('docgen CI failure'));
            if (!duplicate) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['bug'],
              });
            }
