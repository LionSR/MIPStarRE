name: Lean Action CI

on:
  push:
    branches:
      - main
    paths:
      - '**.lean'
      - 'lakefile.*'
      - 'lean-toolchain'
      - 'lake-manifest.json'
      - '.github/workflows/lean_action_ci.yml'
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - '**.lean'
      - 'lakefile.*'
      - 'lean-toolchain'
      - 'lake-manifest.json'
      - '.github/workflows/lean_action_ci.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Build-cache policy: the cache is saved only from main and restored
# everywhere. lean-action's built-in GitHub cache is disabled because it
# saved a ~2.6 GB entry per PR run; those entries cycle through the 10 GB
# repository cache budget and evict the main-branch entry, so no run ever
# restored usable MIPStarRE oleans and every run rebuilt the whole library
# (the same failure mode was measured and fixed in LionSR/TNLean).
# Mathlib and its dependencies are intentionally excluded from the cache:
# `lake exe cache get` (run inside lean-action) restores them faster than
# a GitHub cache of that size could.

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Free disk space before Lean setup
        run: |
          df -h
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost
          if [ -n "${AGENT_TOOLSDIRECTORY:-}" ]; then
            sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          fi
          df -h

      - name: Restore Lean build cache
        uses: actions/cache/restore@v4
        with:
          path: .lake/build
          key: mipstarre-build-${{ hashFiles('lean-toolchain', 'lake-manifest.json', 'lakefile.toml') }}-${{ github.sha }}
          restore-keys: |
            mipstarre-build-${{ hashFiles('lean-toolchain', 'lake-manifest.json', 'lakefile.toml') }}-

      - uses: leanprover/lean-action@v1
        with:
          use-github-cache: false

      - name: Build axiom audit regression checks
        run: lake build MIPStarRE.LDT.Test.AxiomAudit

      # Save even when the build failed: a partial cache still spares the
      # next run the modules that did compile.
      - name: Save Lean build cache (main only)
        if: always() && github.ref == 'refs/heads/main'
        uses: actions/cache/save@v4
        with:
          path: .lake/build
          key: mipstarre-build-${{ hashFiles('lean-toolchain', 'lake-manifest.json', 'lakefile.toml') }}-${{ github.sha }}
