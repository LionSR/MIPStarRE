name: Proof-evasion helper audits

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'MIPStarRE/**/*.lean'
      - 'scripts/audit_conclusion_shaped_hypotheses.py'
      - 'scripts/check_duplicate_private_helpers.py'
      - 'scripts/lean_header_utils.py'
      - 'scripts/tests/**'
      - '.github/workflows/proof-evasion-helper-audits.yml'

# Duplicate private-helper findings remain advisory for #1145: exact duplicate
# proof bodies are review candidates, not proof of semantic duplication.
# Conclusion-shaped hypotheses are blocking for #1458/#493: a theorem must not
# hide its conclusion as an explicit existential hypothesis.

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  proof-evasion-helper-audits:
    name: Report proof-evasion helper audits
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Run script regression tests
        run: |
          python3 -m unittest scripts/tests/test_check_duplicate_private_helpers.py
          python3 -m unittest scripts/tests/test_audit_conclusion_shaped_hypotheses.py

      - name: Run conclusion-shaped hypothesis audit
        run: |
          python3 scripts/audit_conclusion_shaped_hypotheses.py \
            --root . \
            --ci

      - name: Run duplicate private-helper audit
        run: |
          set +e
          python3 scripts/check_duplicate_private_helpers.py \
            --root . \
            --github-annotations \
            --ci
          audit_status=$?
          set -e
          if [ "$audit_status" -eq 1 ]; then
            echo "Duplicate private-helper candidates were reported; this audit is advisory."
            exit 0
          fi
          exit "$audit_status"
