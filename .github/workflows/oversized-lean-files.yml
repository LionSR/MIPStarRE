name: Oversized Lean file guard

on:
  pull_request:
    types: [opened, synchronize, reopened]

# NOTE: As of 2026-05-03, this check reports ~19 oversized files on main
# (tracked in issue #1127).  The script exits non-zero but the step uses
# ``continue-on-error: true`` so the check is advisory-only.  Once all
# oversized files have been split, remove that line to make the gate
# blocking.

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  guard:
    name: Check Lean file lengths
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Run oversized-file guard
        continue-on-error: true  # TODO(#1127): remove once all files are split
        run: python3 scripts/check_oversized_lean_files.py --root .
