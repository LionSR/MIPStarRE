name: Oversized Lean file guard

on:
  pull_request:
    types: [opened, synchronize, reopened]

# NOTE: As of 2026-05-07, one known oversized file remains on main:
#   MIPStarRE/LDT/SelfImprovement/Theorems/Results/BoundednessTransport.lean (1684 lines)
# This file is tracked by issue #1127 (partial split).  Once it is split,
# remove ``continue-on-error: true`` below to make the gate blocking.

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  guard:
    name: Check Lean file lengths
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Run oversized-file guard
        continue-on-error: true  # TODO(#1127): remove once all files are split
        run: python3 scripts/check_oversized_lean_files.py --root .
