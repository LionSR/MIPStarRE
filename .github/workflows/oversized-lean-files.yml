name: Oversized Lean file guard

on:
  pull_request:
    types: [opened, synchronize, reopened]

# NOTE: As of 2026-05-07, one known oversized file remains on main:
#   MIPStarRE/LDT/SelfImprovement/Theorems/Results/BoundednessTransport.lean (1697 lines)
# This file is tracked by issue #1127 (partial split).
# Once it is split, remove the ``--known`` argument below.
# New oversized files cause the check to fail.

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  guard:
    name: Check Lean file lengths
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Run oversized-file guard
        run: >
          python3 scripts/check_oversized_lean_files.py
          --root .
          --known MIPStarRE/LDT/SelfImprovement/Theorems/Results/BoundednessTransport.lean
