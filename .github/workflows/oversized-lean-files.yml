name: Oversized Lean file guard

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - '**.lean'
      - 'scripts/check_oversized_lean_files.py'
      - 'scripts/tests/test_check_oversized_lean_files.py'
      - '.github/workflows/oversized-lean-files.yml'

# NOTE: As of 2026-05-03, this check will fail against main because ~19 files
# still exceed 1000 lines (tracked in issue #1127).  Once all oversized files
# have been split, this workflow can be enabled as a blocking CI check by
# removing or commenting out the ``continue-on-error`` line below.

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  guard:
    name: Check Lean file lengths
    runs-on: ubuntu-latest
    continue-on-error: true  # TODO(#1127): remove once all files are split
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Run oversized-file guard
        run: python3 scripts/check_oversized_lean_files.py --root .
