name: Paper-facing proof-debt audit

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'MIPStarRE/**/*.lean'
      - 'blueprint/src/chapter/**/*.tex'
      - 'scripts/audit_paper_facing_proof_debt.py'
      - 'scripts/blueprint_lean_sync.py'
      - 'scripts/lean_header_utils.py'
      - 'scripts/tests/test_audit_paper_facing_proof_debt.py'
      - '.github/workflows/paper-facing-proof-debt-audit.yml'

# Blocking guard for issue #1458: paper-facing theorem-like blueprint entries
# must not acquire non-paper bridge, residual, repair, package, producer, input,
# or visibly conditional declaration-name dependencies.

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  audit:
    name: Paper-facing proof-debt audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Run script regression tests
        run: python3 -m unittest scripts/tests/test_audit_paper_facing_proof_debt.py

      - name: Run paper-facing proof-debt audit
        run: |
          python3 scripts/audit_paper_facing_proof_debt.py \
            --root . \
            --ci \
            2>&1 | tee "$RUNNER_TEMP/paper-facing-proof-debt-audit.log"

      - name: Surface findings in step summary
        if: always()
        run: |
          {
            echo "### Paper-facing proof-debt audit"
            echo
            echo '```text'
            cat "$RUNNER_TEMP/paper-facing-proof-debt-audit.log"
            echo '```'
            echo
            echo 'This check is blocking: new bridge, residual, repair,'
            echo 'package, producer, input, or visibly conditional theorem links'
            echo 'on paper-facing declarations must be repaired before merge.'
          } >> "$GITHUB_STEP_SUMMARY"
