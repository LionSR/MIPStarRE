# ci-sync-version: claude-provider-deepseek-v1
# ci-sync-source: shared Lean automation, prompts externalized under .github/prompts
name: Lean Formalization Audit

on:
  workflow_dispatch:
    inputs:
      audit_type:
        description: "Type of audit to perform"
        required: true
        type: choice
        options:
          - sorry-audit
          - blueprint-check
          - mathlib-readiness
        default: "sorry-audit"

jobs:
  audit:
    runs-on: ubuntu-latest
    env:
      CLAUDE_CODE_PROVIDER: ${{ vars.CLAUDE_CODE_PROVIDER || 'anthropic' }}
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      ANTHROPIC_BASE_URL: ${{ vars.ANTHROPIC_BASE_URL }}
      CLAUDE_OPUS_MODEL: ${{ vars.CLAUDE_OPUS_MODEL }}
      CLAUDE_SONNET_MODEL: ${{ vars.CLAUDE_SONNET_MODEL }}
    permissions:
      contents: read
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up Lean toolchain and cache
        uses: ./.github/actions/setup-lean
        with:
          install-blueprint: 'true'

      - name: Run Lean Audit
        uses: ./.github/actions/claude-code-with-provider
        with:
          provider: ${{ env.CLAUDE_CODE_PROVIDER }}
          model-tier: sonnet
          system-prompt-file: .github/prompts/lean-audit-system-prompt.md
          allowed_tools_preset: lean-audit
          claude-prompt-file: .github/prompts/lean-audit-prompt.md
          claude-prompt-context: |
            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Audit type: ${{ github.event.inputs.audit_type }}

            ${{ github.event.inputs.audit_type == 'sorry-audit' && 'Task: Scan the entire MIPStarRE/ directory for `sorry` usage. For each sorry found, report: (1) file path and line number, (2) the theorem/lemma name, (3) a brief assessment of difficulty to complete (easy/medium/hard based on context). Summarize total count and group by difficulty. Output a markdown table.' || '' }}
            ${{ github.event.inputs.audit_type == 'blueprint-check' && 'Task: Compare the blueprint/ directory (look for .tex files listing theorems/lemmas to formalize) against the MIPStarRE/ directory. Report: (1) which blueprint items are fully formalized, (2) which are partially formalized, (3) which are missing entirely. Count an item as fully formalized only when its public Lean statement is source-faithful, has no `sorry` in the relevant proof, and does not require a non-paper bridge, residual, repair, package, producer, proof-obligation input, hypotheses bundle, assumptions bundle, or arbitrary implication/caller-supplied proposition input. Output a markdown progress report with percentages.' || '' }}
            ${{ github.event.inputs.audit_type == 'mathlib-readiness' && 'Task: Review the MIPStarRE/ directory for lemmas that could be upstreamed to Mathlib. Look for: (1) general-purpose lemmas not specific to the MIP* = RE / low-degree-test domain, (2) lemmas that fill gaps in existing Mathlib files (check import paths), (3) well-documented, sorry-free results. For each candidate, note the file, lemma name, and which Mathlib module it could belong to. Output a markdown list.' || '' }}
