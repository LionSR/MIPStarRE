name: Blueprint

on:
  push:
    branches:
      - main
    paths:
      - 'blueprint/src/**'
      - 'home_page/**'
  workflow_dispatch:

# Serialize gh-pages deployments across blueprint/docgen workflows;
# do not cancel in-progress deploys when new commits arrive.
concurrency:
  group: gh-pages-deploy
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  blueprint:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    name: Build and deploy blueprint
    steps:
      - name: Checkout project
        uses: actions/checkout@v6

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: .github/workflows/blueprint-requirements.txt

      - name: Install system dependencies
        uses: ./.github/actions/setup-blueprint-system-deps
        with:
          cache-suffix: pdf-v1
          extra-packages: texlive-xetex texlive-science latexmk

      - name: Install leanblueprint
        run: |
          pipx install leanblueprint
          pipx inject --include-apps --force leanblueprint plastex

      - name: Build blueprint
        working-directory: blueprint
        run: |
          tmp_output_file="$(mktemp)"

          set +o pipefail
          {
            leanblueprint pdf
            pdf_status=$?
            if [ "$pdf_status" -ne 0 ]; then
              exit "$pdf_status"
            fi
            if [ ! -s print/print.pdf ]; then
              echo "::error::leanblueprint pdf produced no output"
              exit 1
            fi
            leanblueprint web
          } 2>&1 | tee "$tmp_output_file"
          cmd_status=${PIPESTATUS[0]}
          set -o pipefail

          if grep -q "^ERROR:" "$tmp_output_file"; then
            echo "::error::Blueprint has unresolved labels (see ERROR lines above)"
            exit 1
          fi
          if grep -q "WARNING: File not found:" "$tmp_output_file"; then
            echo "::error::Blueprint has missing files (see WARNING lines above)"
            exit 1
          fi
          if [ "$cmd_status" -ne 0 ]; then
            exit "$cmd_status"
          fi

      - name: Deploy to gh-pages
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: ./scripts/deploy-to-gh-pages.sh --ci
