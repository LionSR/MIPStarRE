name: Blueprint

on:
  push:
    branches:
      - main
    paths:
      - 'blueprint/src/**'
      - 'home_page/**'
  workflow_dispatch:

# Serialize gh-pages deployments across blueprint/docgen workflows;
# do not cancel in-progress deploys when new commits arrive.
concurrency:
  group: gh-pages-deploy
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  blueprint:
    runs-on: ubuntu-latest
    name: Build and deploy blueprint
    steps:
      - name: Checkout project
        uses: actions/checkout@v6

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            texlive-xetex \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-science \
            latexmk \
            graphviz \
            libgraphviz-dev

      - name: Install leanblueprint
        run: |
          pipx install leanblueprint
          pipx inject --include-apps --force leanblueprint plastex

      - name: Build blueprint
        working-directory: blueprint
        run: |
          leanblueprint pdf
          tmp_output_file="$(mktemp)"

          set +o pipefail
          leanblueprint web 2>&1 | tee "$tmp_output_file"
          cmd_status=${PIPESTATUS[0]}
          set -o pipefail

          if grep -q "^ERROR:" "$tmp_output_file"; then
            echo "::error::Blueprint has unresolved labels (see ERROR lines above)"
            exit 1
          fi
          if grep -q "WARNING: File not found:" "$tmp_output_file"; then
            echo "::error::Blueprint has missing files (see WARNING lines above)"
            exit 1
          fi
          if [ "$cmd_status" -ne 0 ]; then
            exit "$cmd_status"
          fi

      - name: Deploy to gh-pages
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: ./scripts/deploy-to-gh-pages.sh --ci
