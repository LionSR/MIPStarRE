name: Blueprint

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/blueprint.yml'
      - 'blueprint/src/**'
      - 'blueprint/lean_decls'
      - 'home_page/**'
  workflow_dispatch:

# Serialize Pages deployments across blueprint/docgen workflows;
# do not cancel in-progress deploys when new commits arrive.
concurrency:
  group: pages-deploy
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build_project:
    runs-on: ubuntu-latest
    name: Build project
    steps:
      - name: Cleanup to free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # main as of 2026-04-13
        with:
          tool-cache: false
          android: true
          dotnet: false
          haskell: false
          large-packages: false
          docker-images: false
          swap-storage: false

      - name: Checkout project
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Build project, blueprint, and documentation
        uses: leanprover-community/docgen-action@main
        with:
          blueprint: true
          homepage: home_page
