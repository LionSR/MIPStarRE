name: Lint blueprint

on:
  push:
    branches:
      - main
    paths:
      - '**.lean'
      - 'lakefile.*'
      - 'lean-toolchain'
      - 'lake-manifest.json'
      - '.github/workflows/lint-blueprint.yml'
      - 'blueprint/src/**'
      - 'scripts/tex_utils.py'
      - 'scripts/blueprint_lean_sync.py'
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
    paths:
      - '**.lean'
      - 'lakefile.*'
      - 'lean-toolchain'
      - 'lake-manifest.json'
      - '.github/workflows/lint-blueprint.yml'
      - 'blueprint/src/**'
      - 'scripts/tex_utils.py'
      - 'scripts/blueprint_lean_sync.py'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-blueprint:
    runs-on: ubuntu-latest
    name: Check blueprint compiles without errors
    permissions:
      contents: read
      # issues:write is needed for posting/updating reverse-coverage PR
      # comments. The comment-posting step is gated on
      # github.event_name == 'pull_request', so this permission is only
      # exercised on PR events.
      issues: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            graphviz libgraphviz-dev \
            texlive-xetex \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-science \
            latexmk

      - name: Install leanblueprint
        run: |
          pip install leanblueprint
          pip install plastex

      # Blueprint helper unit tests (scripts/tests/test_*.py), the blueprint
      # LaTeX convention lint (scripts/check_blueprint_latex.py), and the
      # Lean-facing blueprint synchronization checks are covered by local hooks
      # and blueprint-sync.yml. This workflow remains the render check.

      - name: Run leanblueprint pdf (catches undefined macros and LaTeX errors)
        working-directory: blueprint
        run: |
          leanblueprint pdf

          if [ ! -s print/print.pdf ]; then
            echo "::error::leanblueprint pdf produced no output"
            exit 1
          fi

      - name: Run leanblueprint web and check for errors
        working-directory: blueprint
        run: |
          set -o pipefail
          tmp_output_file="$(mktemp)"

          # Run leanblueprint, streaming output to the log and capturing it to a file
          set +o pipefail
          leanblueprint web 2>&1 | tee "$tmp_output_file"
          cmd_status=${PIPESTATUS[0]}
          set -o pipefail

          # Check for blueprint ERROR lines in the captured output
          if grep -q "^ERROR:" "$tmp_output_file"; then
            echo "::error::Blueprint has unresolved labels (see ERROR lines above)"
            exit 1
          fi
          if grep -q "WARNING: File not found:" "$tmp_output_file"; then
            echo "::warning::Blueprint has missing file references (see WARNING lines above)"
          fi

          # If leanblueprint itself failed, propagate its exit status
          if [ "$cmd_status" -ne 0 ]; then
            exit "$cmd_status"
          fi
