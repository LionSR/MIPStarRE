name: Lint blueprint

on:
  push:
    branches:
      - main
    paths:
      - '**.lean'
      - 'lakefile.*'
      - 'lean-toolchain'
      - 'lake-manifest.json'
      - '.github/actions/setup-lean/**'
      - '.github/workflows/lint-blueprint.yml'
      - 'blueprint/src/**'
      - 'scripts/check_blueprint_latex.py'
      - 'scripts/tests/**'
      - 'scripts/tex_utils.py'
      - 'scripts/blueprint_lean_sync.py'
  pull_request:
    types: [opened, synchronize, reopened, labeled]
    paths:
      - '**.lean'
      - 'lakefile.*'
      - 'lean-toolchain'
      - 'lake-manifest.json'
      - '.github/actions/setup-lean/**'
      - '.github/workflows/lint-blueprint.yml'
      - 'blueprint/src/**'
      - 'scripts/check_blueprint_latex.py'
      - 'scripts/tests/**'
      - 'scripts/tex_utils.py'
      - 'scripts/blueprint_lean_sync.py'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-blueprint:
    runs-on: ubuntu-latest
    name: Check blueprint compiles without errors
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y graphviz libgraphviz-dev

      - name: Install leanblueprint
        run: |
          pip install leanblueprint
          pip install plastex

      - name: Test blueprint Python helpers
        run: python3 -m unittest discover -s scripts/tests -p 'test_*.py'

      - name: Check blueprint LaTeX conventions
        run: python3 scripts/check_blueprint_latex.py --root blueprint/src

      - name: Run leanblueprint web and check for errors
        working-directory: blueprint
        run: |
          set -o pipefail
          tmp_output_file="$(mktemp)"

          # Run leanblueprint, streaming output to the log and capturing it to a file
          set +o pipefail
          leanblueprint web 2>&1 | tee "$tmp_output_file"
          cmd_status=${PIPESTATUS[0]}
          set -o pipefail

          # Check for blueprint ERROR lines in the captured output
          if grep -q "^ERROR:" "$tmp_output_file"; then
            echo "::error::Blueprint has unresolved labels (see ERROR lines above)"
            exit 1
          fi
          if grep -q "WARNING: File not found:" "$tmp_output_file"; then
            echo "::warning::Blueprint has missing file references (see WARNING lines above)"
          fi

          # If leanblueprint itself failed, propagate its exit status
          if [ "$cmd_status" -ne 0 ]; then
            exit "$cmd_status"
          fi

      # ── Lean-dependent checks ──
      # These require a full Lean build, which is already covered by
      # lean_action_ci.yml. Keep setup and full-surface checks best-effort,
      # but fail PRs when changed paper-facing Lean declarations are not
      # reflected in the blueprint.

      - name: Set up Lean toolchain
        continue-on-error: true
        id: lean-setup
        uses: ./.github/actions/setup-lean

      - name: Generate lean_decls from blueprint .tex files
        if: steps.lean-setup.outcome == 'success'
        continue-on-error: true
        id: lean-decls
        run: python3 scripts/blueprint_lean_sync.py --root . --update-lean-decls

      - name: Check blueprint and Lean source stay in sync
        if: steps.lean-setup.outcome == 'success' && steps.lean-decls.outcome == 'success'
        continue-on-error: true
        run: python3 scripts/blueprint_lean_sync.py --root . --ci

      - name: Fetch PR base ref for diff
        if: github.event_name == 'pull_request' && steps.lean-setup.outcome == 'success'
        continue-on-error: true
        id: fetch-base
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: git fetch --no-tags origin "$BASE_REF"

      - name: Report changed Lean declarations missing blueprint entries
        if: |
          github.event_name == 'pull_request' &&
          steps.lean-setup.outcome == 'success' &&
          steps.fetch-base.outcome == 'success' &&
          !contains(github.event.pull_request.labels.*.name, 'enforce-blueprint-coverage')
        continue-on-error: true
        env:
          BASE_REF: origin/${{ github.event.pull_request.base.ref }}
        run: |
          python3 - <<'PY'
          import os
          import subprocess

          base_ref = os.environ["BASE_REF"]

          changed = subprocess.check_output(
              [
                  "git",
                  "diff",
                  "--merge-base",
                  "--name-only",
                  "--diff-filter=AMR",
                  base_ref,
                  "--",
                  "MIPStarRE/**/*.lean",
              ],
              text=True,
          )
          changed_lean_files = [line for line in changed.splitlines() if line.endswith(".lean")]

          if not changed_lean_files:
              print("No changed MIPStarRE/*.lean files in this pull request.")
              raise SystemExit(0)

          subprocess.run(
              [
                  "python3",
                  "scripts/blueprint_lean_sync.py",
                  "--root",
                  ".",
                  "--warn-missing-blueprint",
                  "--diff-base",
                  base_ref,
                  "--changed-files",
                  *changed_lean_files,
              ],
              check=True,
          )
          PY

      - name: Enforce changed Lean declarations have blueprint entries
        if: |
          github.event_name == 'pull_request' &&
          steps.lean-setup.outcome == 'success' &&
          steps.fetch-base.outcome == 'success' &&
          contains(github.event.pull_request.labels.*.name, 'enforce-blueprint-coverage')
        env:
          BASE_REF: origin/${{ github.event.pull_request.base.ref }}
        run: |
          python3 - <<'PY'
          import os
          import subprocess

          base_ref = os.environ["BASE_REF"]

          changed = subprocess.check_output(
              [
                  "git",
                  "diff",
                  "--merge-base",
                  "--name-only",
                  "--diff-filter=AMR",
                  base_ref,
                  "--",
                  "MIPStarRE/**/*.lean",
              ],
              text=True,
          )
          changed_lean_files = [line for line in changed.splitlines() if line.endswith(".lean")]

          if not changed_lean_files:
              print("No changed MIPStarRE/*.lean files in this pull request.")
              raise SystemExit(0)

          subprocess.run(
              [
                  "python3",
                  "scripts/blueprint_lean_sync.py",
                  "--root",
                  ".",
                  "--warn-missing-blueprint",
                  "--fail-on-missing-blueprint",
                  "--diff-base",
                  base_ref,
                  "--changed-files",
                  *changed_lean_files,
              ],
              check=True,
          )
          PY

      - name: Check blueprint Lean declarations
        if: steps.lean-setup.outcome == 'success' && steps.lean-decls.outcome == 'success'
        continue-on-error: true
        run: |
          if ! lake exe checkdecls blueprint/lean_decls; then
            echo "::warning::Some blueprint/lean_decls entries have no matching Lean declaration yet (this is expected while formalization is in progress)"
          fi
