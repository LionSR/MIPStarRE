name: Statement-like paper-origin guard

on:
  pull_request:
    types: [opened, synchronize, reopened]

# Blocking guard for the issue #1379 earn-your-place policy: every
# Statement/Witness/Hypotheses/Conclusion/Input/Assumptions/Bridge/Producer/
# Package/Residual declaration in MIPStarRE/LDT must cite a paper path, paper
# label, or documented paper gap at its definition site.
#
# See: issue #1413 (CI wiring), ledgers #1379 / #1384 (backfill).

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  guard:
    name: Paper-origin citations for statement-like declarations
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Run statement paper-origin guard
        run: |
          set -o pipefail
          python3 scripts/check_statement_paper_origin.py \
            --root . \
            2>&1 | tee "$RUNNER_TEMP/statement-paper-origin.log"

      - name: Surface violations in step summary
        if: always()
        run: |
          {
            echo "### Statement-like paper-origin guard"
            echo
            echo '```text'
            cat "$RUNNER_TEMP/statement-paper-origin.log"
            echo '```'
            echo
            echo 'This is a blocking check. New statement-like declarations'
            echo 'must cite `references/ldt-paper/`, a paper `\label{...}`,'
            echo 'or a documented paper gap at their definition site.'
          } >> "$GITHUB_STEP_SUMMARY"
