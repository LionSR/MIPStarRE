name: Statement paper-origin guard

on:
  pull_request:
    types: [opened, synchronize, reopened]

# Runs as a non-blocking warning during the issue #1384 backfill.
# Once the backfill lands and zero warnings remain on main, remove
# ``--warn-only`` to promote this check to a blocking CI guard.
#
# See: issue #1413 (CI wiring), ledgers #1379 / #1384 (backfill).

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  guard:
    name: Paper-origin citations for *Statement declarations
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Run statement paper-origin guard (warn-only)
        run: |
          python3 scripts/check_statement_paper_origin.py \
            --root . \
            --warn-only \
            2>&1 | tee "$RUNNER_TEMP/statement-paper-origin.log"
          # tee returns the exit code of the first command (the guard).
          # --warn-only means violations print to stderr but exit 0.

      - name: Surface violations in step summary
        if: always()
        run: |
          {
            echo "### Statement paper-origin guard (--warn-only)"
            echo
            echo '```text'
            cat "$RUNNER_TEMP/statement-paper-origin.log"
            echo '```'
            echo
            echo 'This check is **non-blocking**. Once the issue #1384 backfill'
            echo 'lands and zero violations remain on `main`, remove'
            echo '`--warn-only` from the workflow to promote it to a'
            echo 'blocking CI guard.'
          } >> "$GITHUB_STEP_SUMMARY"
