name: 'Setup leanblueprint'
description: 'Install Python and leanblueprint for blueprint and documentation workflows'

runs:
  using: 'composite'
  steps:
    - name: Install Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'
        cache: 'pip'
        cache-dependency-path: .github/workflows/blueprint-requirements.txt

    - name: Install leanblueprint
      shell: bash
      run: |
        pipx install leanblueprint
        pipx inject --include-apps --force leanblueprint plastex
