name: Formalization Task
description: A specific theorem, definition, or lemma to formalize in Lean
labels: ["formalization"]
body:
  - type: input
    id: statement
    attributes:
      label: Mathematical statement
      description: Name and source of the result to formalize
      placeholder: "e.g., Thm 5.1: quantum soundness of the low individual degree test"
    validations:
      required: true

  - type: input
    id: reference
    attributes:
      label: Reference
      description: Paper or textbook citation
      placeholder: "e.g., arXiv:2009.12982 Theorem 5.1"
    validations:
      required: true

  - type: input
    id: lean_target
    attributes:
      label: Target Lean declaration
      description: Expected Lean name and file path
      placeholder: "e.g., LDT.mainInductionStep in MIPStarRE/LDT/MainInductionStep.lean"
    validations:
      required: false

  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies
      description: Existing Lean declarations or issues this depends on
      placeholder: |
        - `LDT.selfImprovement` (exists)
        - #42 (pasting lemma, in progress)
    validations:
      required: false

  - type: textarea
    id: sketch
    attributes:
      label: Proof sketch / approach
      description: Brief outline of the formalization strategy
      placeholder: Optional
    validations:
      required: false

  - type: input
    id: tracking
    attributes:
      label: Tracking issue
      description: Parent tracking issue if applicable
      placeholder: "e.g., #10"
    validations:
      required: false
