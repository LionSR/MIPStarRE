name: Tracking Issue
description: Create a tracking issue to monitor progress across multiple issues and PRs
labels: ["tracking"]
body:
  - type: markdown
    attributes:
      value: |
        ## Tracking Issue
        Use this template to create an issue that tracks progress across multiple related issues and PRs.
        Attach each tracked issue as a GitHub sub-issue after creating the
        parent. The body can keep a readable index, but markdown checkboxes and
        retired tasklist fences do not create native sub-issue relationships.

  - type: input
    id: area
    attributes:
      label: Area
      description: Which area of the project does this track?
      placeholder: e.g., LDT, Quantum, TensorCode, Infrastructure
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the goal this tracking issue covers
      placeholder: What is the overall objective?
    validations:
      required: true

  - type: textarea
    id: tasks
    attributes:
      label: Sub-Issue Index
      description: |
        List issue references that should be attached as GitHub sub-issues.
        After creation, add them through the issue sidebar or the sub-issues API.
        This field is a readable index only.
      value: |
        ### Tasks
        - #
        - #
        - #
      placeholder: |
        ### Tasks
        - #42
        - #43
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Additional Notes
      description: Any extra context, dependencies, or milestones
      placeholder: Optional notes
    validations:
      required: false
